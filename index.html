<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presensi MMU</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1b5e20">
    <style>
        body { font-family: sans-serif; background-color: #FFFFFF; color: #000000; margin: 0; padding: 0; }
        
        /* HEADER TANGGAL HIJRIAH (Tampil Setelah Login) */
        #main-header { 
            background: linear-gradient(135deg, #1b5e20, #2e7d32); 
            color: #FFFFFF; 
            padding: 15px; 
            text-align: center;
            border-bottom: 4px solid #f57f17;
        }
        .hijri-text { font-size: 18px; font-weight: bold; margin-bottom: 3px; }
        .masehi-text { font-size: 12px; opacity: 0.8; }

        .container { padding: 20px; }
        .btn { background-color: #1b5e20; color: #FFFFFF; border: none; padding: 15px; width: 100%; border-radius: 5px; font-size: 16px; margin-bottom: 10px; cursor: pointer; font-weight: bold; }
        .btn-outline { background-color: #FFFFFF; color: #000000; border: 2px solid #1b5e20; }
        .input-field { width: 100%; padding: 15px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; box-sizing: border-box; text-align: center; }
        
        .student-row { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ccc; padding: 12px 0; }
        .status-btn { padding: 6px 12px; border: 1px solid #ccc; border-radius: 20px; background-color: #FFFFFF; margin-left: 5px; cursor: pointer; font-weight: bold;}
        .status-btn.active-H { background-color: #1b5e20; color: white; border-color: #1b5e20; }
        .status-btn.active-S, .status-btn.active-I { background-color: #f57f17; color: white; border-color: #f57f17; }
        .status-btn.active-A { background-color: #000000; color: white; border-color: #000000; }
        
        .card { border: 1px solid #1b5e20; border-radius: 5px; padding: 15px; margin-bottom: 15px; text-align: center; position: relative; overflow: hidden; background-color: #ffffff; }
        .card h4 { margin: 0 0 10px 0; color: #1b5e20; position: relative; z-index: 2; }
        .card .number { font-size: 24px; font-weight: bold; position: relative; z-index: 2; }
        .card-warning { border-color: #f57f17; background-color: #fffde7; }
        .card-warning h4 { color: #f57f17; }
        
        /* Watermark Logo Transparan di Dasbor */
        .watermark { position: absolute; right: -20px; bottom: -20px; opacity: 0.1; width: 100px; z-index: 1; }
        
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="screen-login" class="container" style="text-align:center; padding-top:40px;">
        <img src="header.svg" alt="Identitas Madrasah" style="width:100%; max-width:350px; margin-bottom:30px;">
        
        <p style="font-size:14px; font-weight:bold; color:#1b5e20;">SISTEM INFORMASI TERPADU</p>
        <input type="tel" id="input-hp" class="input-field" placeholder="Nomor HP">
        <input type="password" id="input-pin" class="input-field" placeholder="PIN 6 Digit" maxlength="6">
        <button class="btn" id="btn-login" onclick="doLogin()">Masuk</button>
        <p id="login-error" style="color:red; text-align:center; display:none;"></p>
    </div>

    <div id="main-header" class="hidden">
        <div class="hijri-text" id="date-hijri">Memuat Tanggal...</div>
        <div class="masehi-text" id="date-masehi"></div>
    </div>

    <div id="screen-loading" class="container hidden">
        <p style="text-align:center; font-weight:bold; color:#1b5e20;" id="loading-text">Memproses data...</p>
    </div>

    <div id="screen-home-guru" class="container hidden">
        <h3 style="text-align:center; color:#1b5e20;">Pilih Kelas</h3>
        <p style="text-align:center; font-size:14px;">Selamat bertugas, <strong id="nama-guru"></strong></p>
        <div id="class-list"></div>
        <button class="btn btn-outline" onclick="location.reload()" style="margin-top:20px;">Keluar</button>
    </div>

    <div id="screen-attendance" class="container hidden">
        <h3 id="class-title" style="color:#1b5e20; border-bottom: 2px solid #1b5e20; padding-bottom:5px;"></h3>
        <div id="student-list"></div>
        <br>
        <button class="btn" onclick="showPreview()">Verifikasi & Kirim</button>
        <button class="btn btn-outline" onclick="showHomeGuru()">Kembali</button>
    </div>

    <div id="screen-preview" class="container hidden">
        <h3 style="color:#1b5e20; text-align:center;">Verifikasi Presensi</h3>
        <p style="text-align:center;">Pastikan data di bawah sudah benar.</p>
        <div id="preview-summary" style="background:#f9f9f9; padding:15px; border-radius:5px; border: 1px solid #ccc;"></div>
        <br>
        <button class="btn btn-outline" onclick="backToAttendance()">Batal</button>
        <button class="btn" id="btn-submit" onclick="submitData()">Selesai & Kirim Data</button>
    </div>

    <div id="screen-dashboard" class="container hidden">
        <h3 style="text-align:center; color:#1b5e20;">Dasbor Pimpinan</h3>
        <p style="text-align:center; font-size:14px; margin-top:-10px;">Ahlan wa Sahlan, <strong id="nama-pimpinan"></strong></p>
        
        <div class="card">
            <img src="logo.svg" class="watermark" alt="Logo">
            <h4>Kehadiran Guru Hari Ini</h4>
            <div class="number" id="dash-guru">- / -</div>
        </div>
        
        <div class="card">
            <img src="logo.svg" class="watermark" alt="Logo">
            <h4>Total Siswa Hadir</h4>
            <div class="number" style="color:#1b5e20;" id="dash-siswa-hadir">-</div>
        </div>
        
        <div style="display:flex; justify-content:space-between; gap:10px;">
            <div class="card" style="flex:1;">
                <h4 style="color:#f57f17; font-size:14px;">Sakit/Izin</h4>
                <div class="number" style="color:#f57f17;" id="dash-siswa-izin">-</div>
            </div>
            <div class="card" style="flex:1;">
                <h4 style="color:#000000; font-size:14px;">Alpa</h4>
                <div class="number" style="color:#000000;" id="dash-siswa-alpa">-</div>
            </div>
        </div>

        <div class="card card-warning">
            <h4>Peringatan Dini</h4>
            <div style="font-weight:bold;" id="dash-warning">-</div>
        </div>
        
        <button class="btn btn-outline" onclick="location.reload()" style="margin-top:20px;">Keluar Sistem</button>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzlFp0HrlOFc8xLQcEqH4h9yB_F_t5Ww5OlUS4a5JF3v0lxzbTn9KDhrjYGxxBHbZ-D/exec";
        let currentUser = "", currentRole = "", allStudents = [], currentClassStudents = [], attendanceData = {};

        // FUNGSI KONVERSI TANGGAL HIJRIAH
        function renderDates() {
            const now = new Date();
            const opsHijri = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            const opsMasehi = { day: 'numeric', month: 'long', year: 'numeric' };
            
            // Mesin cerdas mendeteksi kalender islam langsung dari browser HP
            const tglHijri = new Intl.DateTimeFormat('id-ID-u-ca-islamic', opsHijri).format(now);
            const tglMasehi = new Intl.DateTimeFormat('id-ID', opsMasehi).format(now);
            
            document.getElementById('date-hijri').innerText = tglHijri + " H";
            document.getElementById('date-masehi').innerText = tglMasehi + " M";
        }

        function doLogin() {
            const hp = document.getElementById('input-hp').value;
            const pin = document.getElementById('input-pin').value;
            const btn = document.getElementById('btn-login');
            const err = document.getElementById('login-error');
            
            if(!hp || !pin) { err.innerText = "Harap isi Nomor HP dan PIN."; err.style.display = "block"; return; }
            
            btn.innerText = "Memverifikasi..."; btn.disabled = true; err.style.display = "none";

            fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "login", ID_Pengguna: hp, Kata_Sandi: pin }) })
            .then(res => res.json())
            .then(data => {
                if(data.status === "sukses") {
                    currentUser = data.nama; currentRole = data.peran.toLowerCase();
                    
                    document.getElementById('screen-login').classList.add('hidden');
                    document.getElementById('main-header').classList.remove('hidden'); // Tampilkan Header Hijriah
                    renderDates(); // Jalankan mesin tanggal
                    
                    if(currentRole === "guru") { loadGuruData(); } 
                    else { loadDashboardData(); }
                } else {
                    err.innerText = data.pesan; err.style.display = "block"; btn.innerText = "Masuk"; btn.disabled = false;
                }
            })
            .catch(e => { err.innerText = "Gangguan jaringan."; err.style.display = "block"; btn.innerText = "Masuk"; btn.disabled = false; });
        }

        function loadGuruData() {
            document.getElementById('screen-loading').classList.remove('hidden');
            document.getElementById('loading-text').innerText = "Memuat daftar kelas...";
            
            fetch(API_URL).then(res => res.json()).then(data => {
                allStudents = data;
                document.getElementById('screen-loading').classList.add('hidden');
                document.getElementById('nama-guru').innerText = currentUser;
                showHomeGuru();
            }).catch(err => { document.getElementById('loading-text').innerText = "Gagal memuat data."; });
        }

        function showHomeGuru() {
            document.getElementById('screen-home-guru').classList.remove('hidden');
            document.getElementById('screen-attendance').classList.add('hidden');
            document.getElementById('screen-preview').classList.add('hidden');
            
            const classes = [...new Set(allStudents.map(s => s.Kelas))];
            const classListDiv = document.getElementById('class-list');
            classListDiv.innerHTML = '';
            
            classes.forEach(c => {
                let btn = document.createElement('button'); btn.className = 'btn btn-outline'; btn.innerText = "Kelas " + c;
                btn.onclick = () => openClass(c); classListDiv.appendChild(btn);
            });
        }

        function openClass(className) {
            document.getElementById('screen-home-guru').classList.add('hidden');
            document.getElementById('screen-attendance').classList.remove('hidden');
            document.getElementById('class-title').innerText = "Kelas " + className;
            currentClassStudents = allStudents.filter(s => s.Kelas === className);
            
            const studentListDiv = document.getElementById('student-list');
            studentListDiv.innerHTML = '';
            
            currentClassStudents.forEach(s => {
                attendanceData[s.ID_Siswa] = 'H';
                let row = document.createElement('div'); row.className = 'student-row';
                row.innerHTML = `
                    <div><strong style="font-size:16px;">${s.Nama_Siswa}</strong><br><small style="color:#555;">ID: ${s.ID_Siswa}</small></div>
                    <div>
                        <span class="status-btn active-H" onclick="setStatus('${s.ID_Siswa}', 'H', this)">H</span>
                        <span class="status-btn" onclick="setStatus('${s.ID_Siswa}', 'S', this)">S</span>
                        <span class="status-btn" onclick="setStatus('${s.ID_Siswa}', 'I', this)">I</span>
                        <span class="status-btn" onclick="setStatus('${s.ID_Siswa}', 'A', this)">A</span>
                    </div>`;
                studentListDiv.appendChild(row);
            });
        }

        function setStatus(id, status, element) {
            attendanceData[id] = status;
            let btns = element.parentElement.getElementsByTagName('span');
            for(let b of btns) b.className = 'status-btn'; 
            element.classList.add('active-' + status);
        }

        function showPreview() {
            document.getElementById('screen-attendance').classList.add('hidden');
            document.getElementById('screen-preview').classList.remove('hidden');
            
            let h=0, s=0, i=0, a=0;
            currentClassStudents.forEach(student => {
                let stat = attendanceData[student.ID_Siswa];
                if(stat==='H') h++; if(stat==='S') s++; if(stat==='I') i++; if(stat==='A') a++;
            });
            document.getElementById('preview-summary').innerHTML = `<p><strong>Hadir:</strong> ${h}</p><p style="color:#f57f17"><strong>Sakit:</strong> ${s}</p><p style="color:#f57f17"><strong>Izin:</strong> ${i}</p><p><strong>Alpa:</strong> ${a}</p>`;
        }

        function backToAttendance() {
            document.getElementById('screen-preview').classList.add('hidden');
            document.getElementById('screen-attendance').classList.remove('hidden');
        }

        function submitData() {
            let btn = document.getElementById('btn-submit'); btn.innerText = "Mengirim..."; btn.disabled = true;
            let payload = currentClassStudents.map(student => ({
                Tanggal: new Date().toLocaleDateString('id-ID'), ID_Siswa: student.ID_Siswa, Nama_Siswa: student.Nama_Siswa,
                Kelas: student.Kelas, Status: attendanceData[student.ID_Siswa], Nama_Guru: currentUser
            }));

            fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "submitAttendance", data: payload }) })
            .then(res => res.text()).then(text => { alert("Presensi berhasil dikirim!"); showHomeGuru(); btn.innerText = "Kirim Data"; btn.disabled = false; })
            .catch(err => { alert("Gagal koneksi."); btn.innerText = "Kirim Data"; btn.disabled = false; });
        }

        function loadDashboardData() {
            document.getElementById('screen-loading').classList.remove('hidden');
            document.getElementById('loading-text').innerText = "Menyusun Dasbor...";
            document.getElementById('nama-pimpinan').innerText = currentUser;

            fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "getDashboardStats" }) })
            .then(res => res.json()).then(data => {
                document.getElementById('screen-loading').classList.add('hidden');
                document.getElementById('screen-dashboard').classList.remove('hidden');
                
                document.getElementById('dash-guru').innerText = `${data.guruHadir} / ${data.totalGuru}`;
                document.getElementById('dash-siswa-hadir').innerText = data.siswaHadir;
                document.getElementById('dash-siswa-izin').innerText = data.siswaSakit + data.siswaIzin;
                document.getElementById('dash-siswa-alpa').innerText = data.siswaAlpa;
                document.getElementById('dash-warning').innerText = data.peringatanKelas;
            }).catch(err => { document.getElementById('loading-text').innerText = "Gagal memuat."; });
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => { navigator.serviceWorker.register('./sw.js').catch(err => {}); });
        }
    </script>
</body>
</html>
